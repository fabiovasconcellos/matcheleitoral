<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Gradient Background - Mesmo do projeto -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter suave -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Top text: INCT ReDem/UFPR -->
    INCT ReDem
  </text>
  
  <!-- Main title: MATCH ELEITORAL -->
  <text x="600" y="260" font-family="Montserrat, Arial, sans-serif" font-size="90" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    MATCH
  </text>
  <text x="600" y="360" font-family="Montserrat, Arial, sans-serif" font-size="90" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    ELEITORAL
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="Montserrat, Arial, sans-serif" font-size="32" font-weight="400" fill="#00d2ff" text-anchor="middle">
    Descubra qual deputado pensa como você
  </text>
  
  <!-- Bottom URL -->
    fabiovasconcellos.github.io/matcheleitoral
  </text>
</svg>
